<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodBingo Pro</title>
    <style>
        body { font-family: sans-serif; background: #eef2f5; padding: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card { border: 2px solid #333; padding: 10px; background: white; cursor: pointer; border-radius: 8px; }
        .card.sold { border-color: #4CAF50; background: #e8f5e9; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        .stats { background: #2c3e50; color: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="stats">
        ባላንስ: <span id="balance">1000.00</span> ETB | ጊዜ: <span id="timer">30</span>s
    </div>

    <h3>ካርዶችን ይምረጡ (ከ 2 አይበልጥም)</h3>
    <div id="cards-grid" class="grid-container"></div>

    <script>
        let balance = 1000.00;
        let selectedCards = [];
        let time = 30;

        // የቢንጎ ቁጥሮችን ማመንጨት
        function generateBingoCard() {
            return {
                B: getUniqueRandom(1, 15, 5),
                I: getUniqueRandom(16, 30, 5),
                N: getUniqueRandom(31, 45, 5),
                G: getUniqueRandom(46, 60, 5),
                O: getUniqueRandom(61, 75, 5)
            };
        }

        function getUniqueRandom(min, max, count) {
            let nums = new Set();
            while(nums.size < count) nums.add(Math.floor(Math.random() * (max - min + 1)) + min);
            return Array.from(nums);
        }

        // ካርዶችን በስክሪኑ ላይ መሳል
        const grid = document.getElementById('cards-grid');
        for (let i = 1; i <= 400; i++) {
            let cardData = generateBingoCard();
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<strong>ካርድ #${i}</strong>
                <table>
                    <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
                    ${[0,1,2,3,4].map(r => `<tr>
                        <td>${cardData.B[r]}</td><td>${cardData.I[r]}</td>
                        <td>${cardData.N[r]}</td><td>${cardData.G[r]}</td><td>${cardData.O[r]}</td>
                    </tr>`).join('')}
                </table>`;

            div.onclick = function() {
                if (div.classList.contains('sold')) {
                    div.classList.remove('sold');
                    selectedCards = selectedCards.filter(id => id !== i);
                    balance += 10;
                } else if (selectedCards.length < 2 && balance >= 10) {
                    div.classList.add('sold');
                    selectedCards.push(i);
                    balance -= 10;
                } else {
                    alert(selectedCards.length >= 2 ? "ከሁለት ካርድ በላይ መምረጥ አይችሉም!" : "በቂ ባላንስ የለዎትም!");
                }
                document.getElementById('balance').innerText = balance.toFixed(2);
            };
            grid.appendChild(div);
        }

        // ሰዓት ቆጠራ
        const timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if (time <= 0) clearInterval(timerInterval);
        }, 1000);
    </script>
</body>
</html>
