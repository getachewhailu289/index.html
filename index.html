<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodBingo Game</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0f2f5; font-size: 14px; }
        .game-container { display: flex; padding: 10px; gap: 10px; }
        
        /* የግራ ሰሌዳ (75 ቁጥሮች) */
        .left-board { display: grid; grid-template-columns: repeat(5, 1fr); width: 60%; background: white; padding: 2px; }
        .cell-board { border: 1px solid #ccc; text-align: center; padding: 10px 0; }
        .cell-board.drawn { background: #4CAF50; color: white; }
        
        /* የቀኝ ካርድ ማሳያ */
        .right-card { width: 40%; background: white; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .ball-display { width: 80px; height: 80px; background: red; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .card-grid { display: flex; gap: 5px; margin-top: 10px; }
        .card-cell { border: 2px solid #ccc; padding: 15px; text-align: center; font-weight: bold; background: #fff59d; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="left-board" class="left-board"></div>
        <div class="right-card">
            <div id="current-ball" class="ball-display">--</div>
            <div style="font-weight:bold;">የእርስዎ ካርድ</div>
            <div id="user-card" class="card-grid"></div>
        </div>
    </div>

    <script>
        // ከ localStorage መረጃውን ማምጣት
        let soldNumbers = JSON.parse(localStorage.getItem('soldNumbers')) || [];
        let drawnNumbers = JSON.parse(localStorage.getItem('drawnNumbers')) || [];

        // የግራ ሰሌዳ መፍጠር
        const board = document.getElementById('left-board');
        for (let i = 1; i <= 75; i++) {
            const div = document.createElement('div');
            div.className = 'cell-board';
            div.id = 'cell-' + i;
            div.innerText = i;
            if (drawnNumbers.includes(i)) div.classList.add('drawn');
            board.appendChild(div);
        }

        // የገዛነውን ካርድ በቀኝ ማሳየት
        const card = document.getElementById('user-card');
        soldNumbers.forEach(n => {
            const div = document.createElement('div');
            div.className = 'card-cell';
            div.innerText = n;
            card.appendChild(div);
        });

        // የወጣውን የመጨረሻ ቁጥር ማሳየት
        if(drawnNumbers.length > 0) {
            document.getElementById('current-ball').innerText = drawnNumbers[drawnNumbers.length - 1];
        }
    </script>
</body>
</html>
