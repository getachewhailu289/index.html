<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>WinBingo Full Game</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .hidden { display: none; }
        
        #stats-bar { display: flex; justify-content: space-between; padding: 15px; background: #333; color: white; border-radius: 10px; margin-bottom: 20px; }
        
        #bingo-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .cell { padding: 10px 5px; border: 1px solid #ccc; text-align: center; cursor: pointer; background: white; border-radius: 4px; }
        .cell.sold { background-color: #4CAF50; color: white; }

        .game-layout { display: flex; gap: 20px; margin-top: 20px; }
        .draw-board { display: grid; grid-template-columns: repeat(5, 30px); gap: 3px; }
        .ball { width: 30px; height: 30px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; background: white; }
        .ball.drawn { background-color: #f44336; color: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <!-- ክፍል 1: ካርድ መግዣ -->
    <div id="selection-view">
        <div id="stats-bar">
            <div>ተሸጠ: <span id="sold-count">0</span></div>
            <div>ጊዜ: <span id="timer">30</span>s</div>
            <div>ሒሳብ: <span id="balance">60.00</span> ETB</div>
        </div>
        <h2>ካርቴላ ይምረጡ </h2>
        <div id="bingo-container"></div>
        <button onclick="startCountdown()" style="margin-top:20px; padding:10px 20px; width: 100%;"></button>
    </div>

    <!-- ክፍል 2: የጨዋታ በይነገጽ -->
    <div id="game-view" class="hidden">
        <h2>የጨዋታ በይነገጽ</h2>
        <div class="game-layout">
            <div id="draw-board" class="draw-board"></div>
        </div>
        <h1 id="current-ball">ቁጥር እየተጠበቀ ነው...</h1>
    </div>

    <!-- ክፍል 3: አሸናፊ ማሳያ -->
    <div id="winner-modal" class="modal">
        <div class="modal-content">
            <div style="font-size: 50px;">🏆</div>
            <div id="winner-text" style="font-size: 24px; color: #4CAF50; font-weight: bold;"></div>
            <div id="prize-amount" style="font-size: 28px; color: #007bff; font-weight: bold;"></div>
            <div id="next-round-timer">NEXT ROUND: 11S</div>
        </div>
    </div>

    <script>
        let soldCount = 0;
        let timeLeft = 30;
        let balance = 60.00;
        const MAX_SELECTION = 2;

        // 1. ሴሎችን መፍጠር (8 ኮለመን + 2 ቁጥር ገደብ)
        const container = document.getElementById('bingo-container');
        for (let i = 1; i <= 400; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            
            cell.addEventListener('click', () => {
                if (cell.classList.contains('sold')) {
                    cell.classList.remove('sold');
                    soldCount--;
                    balance += 1.5;
                } else if (soldCount < MAX_SELECTION) {
                    cell.classList.add('sold');
                    soldCount++;
                    balance -= 1.5;
                } else {
                    alert("ከሁለት ቁጥር በላይ መምረጥ አይችሉም!");
                }
                document.getElementById('sold-count').innerText = soldCount;
                document.getElementById('balance').innerText = balance.toFixed(2);
            });
            container.appendChild(cell);
        }

        // 2. የሰከንድ ቆጠራ
        const countdown = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
            } else {
                clearInterval(countdown);
            }
        }, 1000);

        // 3. ጨዋታ መጀመር
        function startCountdown() {
            document.getElementById('selection-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            setupDrawBoard();
        }

        function setupDrawBoard() {
            const board = document.getElementById('draw-board');
            for (let i = 1; i <= 75; i++) {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.id = 'ball-' + i;
                ball.innerText = i;
                board.appendChild(ball);
            }
        }

        // 4. አሸናፊ ማሳያ
        function showWinner(winnerName, prize) {
            document.getElementById('winner-modal').style.display = 'flex';
            document.getElementById('winner-text').innerText = winnerName + " has won!";
            document.getElementById('prize-amount').innerText = prize + " ETB";
        }
    </script>
</body>
</html>
