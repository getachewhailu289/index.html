<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>GoodBingo Full Game</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .hidden { display: none; }
        
        /* ምርጫ: 8 ኮለመን እንዲሆን ተቀይሯል */
        #bingo-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; }
        .cell { padding: 5px; border: 1px solid #ccc; text-align: center; cursor: pointer; background: white; }
        .cell.sold { background-color: #4CAF50; color: white; }

        /* ጨዋታ */
        .game-layout { display: flex; gap: 20px; margin-top: 20px; }
        .draw-board { display: grid; grid-template-columns: repeat(5, 30px); gap: 3px; }
        .ball { width: 30px; height: 30px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; background: white; }
        .ball.drawn { background-color: #f44336; color: white; }

        /* ሞዳል */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <!-- ክፍል 1: ካርድ መግዣ -->
    <div id="selection-view">
        <h2>ካርድዎን ይምረጡ (400 ቁጥሮች)</h2>
        <div id="bingo-container"></div>
        <button onclick="startCountdown()" style="margin-top:20px; padding:10px 20px;">ጨዋታ ይጀምሩ</button>
    </div>

    <!-- ክፍል 2: የጨዋታ በይነገጽ -->
    <div id="game-view" class="hidden">
        <h2>የጨዋታ በይነገጽ</h2>
        <div class="game-layout">
            <div id="draw-board" class="draw-board"></div>
            <div id="my-card-display"><h3>የእርስዎ ካርድ</h3></div>
        </div>
        <h1 id="current-ball">ቁጥር እየተጠበቀ ነው...</h1>
    </div>

    <!-- ክፍል 3: አሸናፊ ማሳያ -->
    <div id="winner-modal" class="modal">
        <div class="modal-content">
            <div style="font-size: 50px;">🏆</div>
            <div id="winner-text" style="font-size: 24px; color: #4CAF50; font-weight: bold;">ela has won!</div>
            <div id="prize-amount" style="font-size: 28px; color: #007bff; font-weight: bold;">1232 ETB</div>
            <div id="next-round-timer">NEXT ROUND: 11S</div>
        </div>
    </div>

    <script>
        // 1. መጀመሪያ ክፍል: ካርድ መግዣ (8 ኮለመን)
        const container = document.getElementById('bingo-container');
        for (let i = 1; i <= 400; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cell.addEventListener('click', () => cell.classList.toggle('sold'));
            container.appendChild(cell);
        }

        // 2. ጨዋታ መጀመር
        function startCountdown() {
            document.getElementById('selection-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            setupDrawBoard();
        }

        function setupDrawBoard() {
            const board = document.getElementById('draw-board');
            for (let i = 1; i <= 75; i++) {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.id = 'ball-' + i;
                ball.innerText = i;
                board.appendChild(ball);
            }
        }

        // 3. አሸናፊ ማሳያ ተግባር
        function showWinner(winnerName, prize) {
            document.getElementById('winner-modal').style.display = 'flex';
            document.getElementById('winner-text').innerText = winnerName + " has won!";
            document.getElementById('prize-amount').innerText = prize + " ETB";
            
            let timeLeft = 11;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('next-round-timer').innerText = "NEXT ROUND: " + timeLeft + "S";
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('winner-modal').style.display = 'none';
                }
            }, 1000);
        }
    </script>
</body>
</html>
