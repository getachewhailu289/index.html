<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>GoodBingo Full Game</title>
    <style>
        body { margin: 0; background-color: #eef2f5; font-family: sans-serif; padding: 10px; }
        .hidden { display: none; }
        
        /* ምርጫ ክፍል */
        #stats-bar { display: flex; justify-content: space-between; padding: 10px; background: #333; color: white; border-radius: 10px; margin-bottom: 20px; }
        #bingo-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .cell { padding: 8px; border: 1px solid #ccc; text-align: center; cursor: pointer; background: white; }
        .cell.sold { background-color: #4CAF50; color: white; }

        /* የጨዋታ ክፍል (Side-by-Side) */
        .header-bar { display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 10px; margin-bottom: 10px; }
        .main-container { display: flex; gap: 15px; }
        
        .left-board { display: grid; grid-template-columns: repeat(5, 40px); background: white; padding: 5px; border-radius: 5px; }
        .head { font-weight: bold; text-align: center; padding: 5px; }
        .ball-cell { border: 1px solid #ddd; padding: 8px 0; text-align: center; background: white; }
        .ball-cell.drawn { background: #4CAF50; color: white; }

        .right-card { background: white; padding: 15px; border-radius: 15px; width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .current-ball { width: 80px; height: 80px; background: red; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; margin: 0 auto 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .card-cell { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .bingo-btn { background: #007bff; color: white; width: 100%; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- ክፍል 1: ካርድ መግዣ -->
    <div id="selection-view">
        <div id="stats-bar">
            <div>ተሸጠ: <span id="sold-count">0</span></div>
            <div>ጊዜ: <span id="timer">30</span>s</div>
            <div>ሒሳብ: <span id="balance">60.00</span> ETB</div>
        </div>
        <h2>ካርድዎን ይምረጡ (ከ 2 ቁጥር አይበልጥም)</h2>
        <div id="bingo-container"></div>
    </div>

    <!-- ክፍል 2: የጨዋታ በይነገጽ -->
    <div id="game-view" class="hidden">
        <div class="header-bar">
            <div>DERASH: 1184 ETB</div>
            <div>BALLS: 1/75</div>
            <div>PLAYERS: 148</div>
        </div>
        <div class="main-container">
            <div id="left-board" class="left-board">
                <div class="head" style="color:blue;">B</div><div class="head" style="color:red;">I</div><div class="head" style="color:orange;">N</div><div class="head" style="color:green;">G</div><div class="head" style="color:purple;">O</div>
            </div>
            <div class="right-card">
                <div id="current-ball-display" class="current-ball">I-23</div>
                <div id="user-card" class="card-grid"></div>
                <button class="bingo-btn">BINGO!</button>
            </div>
        </div>
    </div>

    <script>
        let soldCount = 0;
        let timeLeft = 30;
        let balance = 60.00;
        const MAX_SELECTION = 2;

        // የካርድ መምረጫ (ሎጂክ)
        const container = document.getElementById('bingo-container');
        for (let i = 1; i <= 400; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cell.addEventListener('click', () => {
                if (cell.classList.contains('sold')) {
                    cell.classList.remove('sold'); soldCount--; balance += 1.5;
                } else if (soldCount < MAX_SELECTION) {
                    cell.classList.add('sold'); soldCount++; balance -= 1.5;
                } else { alert("ከሁለት ቁጥር በላይ መምረጥ አይችሉም!"); }
                document.getElementById('sold-count').innerText = soldCount;
                document.getElementById('balance').innerText = balance.toFixed(2);
            });
            container.appendChild(cell);
        }

        // የሰከንድ ቆጠራ
        const countdown = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
            } else {
                clearInterval(countdown);
                startCountdown();
            }
        }, 1000);

        function startCountdown() {
            document.getElementById('selection-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            setupGameBoard();
        }

        function setupGameBoard() {
            const board = document.getElementById('left-board');
            for (let i = 1; i <= 75; i++) {
                const cell = document.createElement('div');
                cell.className = 'ball-cell';
                cell.innerText = i;
                board.appendChild(cell);
            }
            // የተጠቃሚ ካርድ መሙያ (ምሳሌ)
            const card = document.getElementById('user-card');
            for(let i=0; i<25; i++) {
                const c = document.createElement('div');
                c.className = 'card-cell';
                c.innerText = i + 1;
                card.appendChild(c);
            }
        }
    </script>
</body>
</html>
