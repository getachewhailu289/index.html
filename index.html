<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodBingo Interface</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #eef2f5; padding: 10px; }
        .hidden { display: none; }
        
        /* ራስጌ (Header) */
        .stats-top { display: flex; gap: 5px; margin-bottom: 15px; }
        .stat-box { flex: 1; padding: 10px; background: #2c3e50; color: white; border-radius: 8px; text-align: center; font-size: 11px; }
        
        /* ሰሌዳ (8 ኮለመን) */
        .grid-board { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; background: white; padding: 5px; border-radius: 10px; }
        .cell { padding: 8px 2px; border-radius: 3px; background: #f8f9fa; text-align: center; border: 1px solid #ddd; cursor: pointer; font-size: 10px; }
        .cell.sold { background: #4CAF50; color: white; }
        
        /* የካርድ ማሳያ */
        #ticket-display { margin-top: 15px; padding: 10px; background: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="shop-view">
        <div class="stats-top">
            <div class="stat-box">ROOM<br>VIP</div>
            <div class="stat-box">SOLD<br><span id="sold-count">0</span></div>
            <div class="stat-box">TIME<br><span id="timer">30</span>s</div>
            <div class="stat-box">BALANCE<br><span id="balance">1000.00</span> ETB</div>
        </div>
        
        <div id="board" class="grid-board"></div>

        <div id="ticket-display">
            <strong>የገዙት ካርቴላ ቁጥር:</strong> <span id="my-tickets">ምንም አልመረጡም</span>
        </div>
    </div>

    <script>
        let balance = 1000.00;
        let soldNumbers = [];
        let time = 30;
        const CARD_PRICE = 10;
        const MAX_SELECTION = 2; // ከፍተኛው የመረጣ ቁጥር

        const board = document.getElementById('board');
        
        for (let i = 1; i <= 400; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.innerText = i;
            div.onclick = function() {
                // መምረጥ ከተፈለገ
                if (!this.classList.contains('sold')) {
                    if (soldNumbers.length < MAX_SELECTION) {
                        if (balance >= CARD_PRICE) {
                            this.classList.add('sold');
                            soldNumbers.push(i);
                            balance -= CARD_PRICE;
                        } else {
                            alert("በቂ ባላንስ የለዎትም!");
                        }
                    } else {
                        alert("ከሁለት ካርድ በላይ መምረጥ አይችሉም!");
                    }
                } 
                // መምረጥ ከተሰረዘ
                else {
                    this.classList.remove('sold');
                    soldNumbers = soldNumbers.filter(n => n !== i);
                    balance += CARD_PRICE;
                }
                updateUI();
            };
            board.appendChild(div);
        }

        function updateUI() {
            document.getElementById('sold-count').innerText = soldNumbers.length;
            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('my-tickets').innerText = soldNumbers.length > 0 ? soldNumbers.join(', ') : "ምንም አልመረጡም";
        }

        const countdown = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            if (time <= 0) {
                clearInterval(countdown);
                alert("ጨዋታው ተጀምሯል!");
            }
        }, 1000);
    </script>
</body>
</html>
