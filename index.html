<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodBingo Full Game</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0f2f5; font-size: 12px; }
        .hidden { display: none; }
        
        /* ክፍል 1: ካርድ መግዣ ስታይል */
        #selection-view { padding: 20px; }
        #stats-bar { display: flex; justify-content: space-between; padding: 10px; background: #333; color: white; border-radius: 10px; margin-bottom: 20px; }
        #bingo-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .cell { padding: 8px; border: 1px solid #ccc; text-align: center; cursor: pointer; background: white; }
        .cell.sold { background-color: #4CAF50; color: white; }

        /* ክፍል 2: የጨዋታ ስታይል */
        .header-bar { display: flex; justify-content: space-between; background: #2c3e50; color: white; padding: 10px; }
        .game-container { display: flex; padding: 5px; gap: 5px; height: 80vh; }
        .left-board { display: grid; grid-template-columns: repeat(5, 1fr); width: 60%; background: white; padding: 2px; }
        .cell-board { border: 1px solid #ccc; text-align: center; padding: 5px 0; }
        .cell-board.drawn { background: #4CAF50; color: white; }
        .right-card { width: 40%; background: white; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        .ball-display { width: 60px; height: 60px; background: red; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <!-- ክፍል 1: ካርድ መግዣ -->
    <div id="selection-view">
        <div id="stats-bar">
            <div>ተሸጠ: <span id="sold-count">0</span></div>
            <div>ጊዜ: <span id="timer">30</span>s</div>
            <div>ሒሳብ: <span id="balance">60.00</span> ETB</div>
        </div>
        <h2>ካርድዎን ይምረጡ</h2>
        <div id="bingo-container"></div>
        <button onclick="startCountdown()" style="width:100%; padding:10px; margin-top:10px;">ጨዋታ ይጀምሩ</button>
    </div>

    <!-- ክፍል 2: የጨዋታ በይነገጽ -->
    <div id="game-view" class="hidden">
        <div class="header-bar">
            <span>DERASH: 1184</span> <span>BALLS: <span id="ball-count">0</span>/75</span>
        </div>
        <div class="game-container">
            <div id="left-board" class="left-board"></div>
            <div class="right-card">
                <div id="current-ball" class="ball-display">--</div>
                <div style="text-align:center;">የእርስዎ ካርድ</div>
            </div>
        </div>
    </div>

    <script>
        // ሎጂክ ክፍል
        let soldCount = 0;
        let timeLeft = 30;
        let drawnNumbers = [];

        // 1. ካርድ መምረጫ
        const container = document.getElementById('bingo-container');
        for (let i = 1; i <= 400; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cell.addEventListener('click', () => {
                if(cell.classList.contains('sold')) { cell.classList.remove('sold'); soldCount--; }
                else if(soldCount < 2) { cell.classList.add('sold'); soldCount++; }
                document.getElementById('sold-count').innerText = soldCount;
            });
            container.appendChild(cell);
        }

        // 2. ሰከንድ ቆጠራ
        const countdown = setInterval(() => {
            if (timeLeft > 0) { timeLeft--; document.getElementById('timer').innerText = timeLeft; }
            else { clearInterval(countdown); startCountdown(); }
        }, 1000);

        function startCountdown() {
            document.getElementById('selection-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            setupGameBoard();
        }

        // 3. ጨዋታ እና ራንደም ቁጥር
        function setupGameBoard() {
            const board = document.getElementById('left-board');
            for (let i = 1; i <= 75; i++) {
                const div = document.createElement('div');
                div.className = 'cell-board';
                div.id = 'cell-' + i;
                div.innerText = i;
                board.appendChild(div);
            }
            // ራንደም ቁጥር ማውጣት
            setInterval(() => {
                if (drawnNumbers.length < 75) {
                    let num;
                    do { num = Math.floor(Math.random() * 75) + 1; } while (drawnNumbers.includes(num));
                    drawnNumbers.push(num);
                    document.getElementById('cell-' + num).classList.add('drawn');
                    document.getElementById('current-ball').innerText = num;
                    document.getElementById('ball-count').innerText = drawnNumbers.length;
                }
            }, 3000);
        }
    </script>
</body>
</html>
