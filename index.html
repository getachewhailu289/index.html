  <!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodBingo Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .hidden { display: none; }
        /* የካርድ ማትሪክስ ስታይል */
        #bingo-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .cell { padding: 10px; border: 1px solid #ccc; text-align: center; background: white; cursor: pointer; }
        .cell.sold { background: #4CAF50; color: white; }
    </style>
</head>
<body>

    <div id="selection-view">
        <h3>ባላንስ: <span id="balance">1000.00</span> ETB</h3>
        <div id="bingo-container"></div>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('userBalance')) || 1000.00;
        let soldNumbers = JSON.parse(localStorage.getItem('soldNumbers')) || [];
        const CARD_PRICE = 10; // ዋጋ ወደ 10 ብር

        const container = document.getElementById('bingo-container');
        
        // 1. ከ1 እስከ 400 ያሉ ካርዶች
        for (let i = 1; i <= 400; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            
            // ካርዱ ቀድሞ ከተገዛ ምልክት ማድረግ
            if (soldNumbers.includes(i)) cell.classList.add('sold');

            cell.addEventListener('click', () => {
                if (cell.classList.contains('sold')) {
                    cell.classList.remove('sold');
                    soldNumbers = soldNumbers.filter(n => n != i);
                    balance += CARD_PRICE;
                } else {
                    if (balance >= CARD_PRICE) {
                        cell.classList.add('sold');
                        soldNumbers.push(i);
                        balance -= CARD_PRICE;
                    } else {
                        alert("በቂ ባላንስ የለዎትም!");
                    }
                }
                updateStorage();
            });
            container.appendChild(cell);
        }

        function updateStorage() {
            localStorage.setItem('userBalance', balance);
            localStorage.setItem('soldNumbers', JSON.stringify(soldNumbers));
            document.getElementById('balance').innerText = balance.toFixed(2);
        }
    </script>
</body>
</html>
