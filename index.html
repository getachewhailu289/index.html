<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>GoodBingo Full Game</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .hidden { display: none; }
        
        /* ምርጫ ክፍል */
        #stats-bar { display: flex; justify-content: space-between; padding: 15px; background: #333; color: white; border-radius: 10px; margin-bottom: 20px; }
        #bingo-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
        .cell { padding: 8px; border: 1px solid #ccc; text-align: center; cursor: pointer; background: white; }
        .cell.sold { background-color: #4CAF50; color: white; }

        /* የጨዋታ ክፍል */
        .game-layout { display: flex; gap: 20px; margin-top: 20px; }
        .board-container { display: grid; grid-template-columns: repeat(5, 40px); gap: 5px; }
        .ball-cell { border: 1px solid #ccc; padding: 10px 0; background: white; text-align: center; }
        .ball-cell.drawn { background-color: #4CAF50; color: white; }
        
        .current-draw { width: 100px; height: 100px; border-radius: 50%; background: red; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <!-- ክፍል 1: ካርድ መግዣ -->
    <div id="selection-view">
        <div id="stats-bar">
            <div>ተሸጠ: <span id="sold-count">0</span></div>
            <div>ጊዜ: <span id="timer">30</span>s</div>
            <div>ሒሳብ: <span id="balance">60.00</span> ETB</div>
        </div>
        <h2>ካርድዎን ይምረጡ (ከ 2 ቁጥር አይበልጥም)</h2>
        <div id="bingo-container"></div>
    </div>

    <!-- ክፍል 2: የጨዋታ በይነገጽ -->
    <div id="game-view" class="hidden">
        <h2>የጨዋታ በይነገጽ</h2>
        <div class="game-layout">
            <div id="board-container" class="board-container"></div>
            <div>
                <div id="current-ball" class="current-draw">--</div>
            </div>
        </div>
    </div>

    <!-- ክፍል 3: አሸናፊ ሞዳል -->
    <div id="winner-modal" class="modal">
        <div class="modal-content">
            <div id="winner-text" style="font-size: 24px; font-weight: bold;"></div>
            <div id="prize-amount" style="font-size: 20px; color: blue;"></div>
        </div>
    </div>

    <script>
        let soldCount = 0;
        let timeLeft = 30;
        let balance = 60.00;
        const MAX_SELECTION = 2;

        // የካርድ መምረጫ
        const container = document.getElementById('bingo-container');
        for (let i = 1; i <= 400; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cell.addEventListener('click', () => {
                if (cell.classList.contains('sold')) {
                    cell.classList.remove('sold');
                    soldCount--;
                    balance += 1.5;
                } else if (soldCount < MAX_SELECTION) {
                    cell.classList.add('sold');
                    soldCount++;
                    balance -= 1.5;
                } else { alert("ከሁለት ቁጥር በላይ መምረጥ አይችሉም!"); }
                document.getElementById('sold-count').innerText = soldCount;
                document.getElementById('balance').innerText = balance.toFixed(2);
            });
            container.appendChild(cell);
        }

        // የሰከንድ ቆጠራ
        const countdown = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
            } else {
                clearInterval(countdown);
                startCountdown();
            }
        }, 1000);

        function startCountdown() {
            document.getElementById('selection-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            setupGameBoard();
        }

        function setupGameBoard() {
            const board = document.getElementById('board-container');
            // የBINGO ፊደላት
            const headers = ['B','I','N','G','O'];
            headers.forEach(h => {
                const head = document.createElement('div');
                head.innerText = h;
                head.style.fontWeight = 'bold';
                board.appendChild(head);
            });
            // የቁጥሮች ሰሌዳ
            for (let i = 1; i <= 75; i++) {
                const cell = document.createElement('div');
                cell.className = 'ball-cell';
                cell.id = 'cell-' + i;
                cell.innerText = i;
                board.appendChild(cell);
            }
        }
    </script>
</body>
</html>
