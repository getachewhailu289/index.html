<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodBingo Pro</title>
    <style>
        body { font-family: sans-serif; background: #eef2f5; padding: 10px; }
        .hidden { display: none; }
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
        .cell { padding: 10px; background: white; border: 1px solid #ccc; text-align: center; cursor: pointer; border-radius: 4px; }
        .cell.sold { background: #4CAF50; color: white; border-color: #2e7d32; }
    </style>
</head>
<body>

    <div id="shop-view">
        <div style="display: flex; gap: 5px; background: #2c3e50; color: white; padding: 10px; border-radius: 8px;">
            <div style="flex:1">ባላንስ: <span id="balance">1000.00</span></div>
            <div style="flex:1">ሰዓት: <span id="timer">30</span>s</div>
            <div style="flex:1">SOLD: <span id="sold-count">0</span></div>
        </div>
        <h3>ካርዶችን ይምረጡ</h3>
        <div id="cards-grid" class="grid-container"></div>
    </div>

    <script>
        // ከ localStorage መረጃን መመለስ
        let balance = parseFloat(localStorage.getItem('balance')) || 1000.00;
        let selectedCards = JSON.parse(localStorage.getItem('selectedCards')) || [];
        let time = parseInt(localStorage.getItem('timer')) || 30;

        document.getElementById('balance').innerText = balance.toFixed(2);
        document.getElementById('sold-count').innerText = selectedCards.length;

        const grid = document.getElementById('cards-grid');
        for (let i = 1; i <= 400; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.innerText = i;
            if(selectedCards.includes(i)) div.classList.add('sold');

            div.onclick = function() {
                if (div.classList.contains('sold')) {
                    div.classList.remove('sold');
                    selectedCards = selectedCards.filter(id => id !== i);
                    balance += 10;
                } else if (selectedCards.length < 2 && balance >= 10) {
                    div.classList.add('sold');
                    selectedCards.push(i);
                    balance -= 10;
                }
                saveAndRefresh();
            };
            grid.appendChild(div);
        }

        function saveAndRefresh() {
            localStorage.setItem('balance', balance);
            localStorage.setItem('selectedCards', JSON.stringify(selectedCards));
            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('sold-count').innerText = selectedCards.length;
        }

        const timerInterval = setInterval(() => {
            time--;
            document.getElementById('timer').innerText = time;
            localStorage.setItem('timer', time);
            if (time <= 0) {
                clearInterval(timerInterval);
                alert("ጨዋታው ተጀምሯል!");
                localStorage.clear(); // ጨዋታ ሲጀመር መረጃውን ማጽዳት
            }
        }, 1000);
    </script>
</body>
</html>
